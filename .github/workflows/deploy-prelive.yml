name: CI/CD pre-live (Hetzner)

# Builds ON the Hetzner box via a self-hosted runner (GitHub-hosted runners are
# over quota; self-hosted minutes are free).
#   - pull_request -> `build` job validates the image compiles (visible merge signal)
#   - push to master / manual -> `deploy` job builds + redeploys on the box,
#     and auto-rolls-back to the last-good image if the health check fails.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: cicd-frontend-prelive-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_API_URL: https://api.dvla.3dt.com.gh/api

jobs:
  # Merge signal: only builds the image, never touches the running stack.
  build:
    name: build
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, dvla-prelive]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build image (validation only — no deploy)
        run: docker build --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" -t dvla-frontend-ci:${{ github.sha }} .

      - name: Clean up CI image
        if: always()
        run: |
          docker rmi dvla-frontend-ci:${{ github.sha }} 2>/dev/null || true
          docker image prune -f

  deploy:
    name: deploy
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, dvla-prelive]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync source into deploy dir
        run: |
          rsync -a --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'tsconfig.tsbuildinfo' \
            ./ /opt/dvla/frontend/

      - name: Capture current image (for rollback)
        id: prev
        working-directory: /opt/dvla
        run: |
          CID=$(docker compose ps -q frontend 2>/dev/null || true)
          if [ -n "$CID" ]; then
            echo "sha=$(docker inspect --format '{{.Image}}' "$CID")" >> "$GITHUB_OUTPUT"
            echo "ref=$(docker inspect --format '{{.Config.Image}}' "$CID")" >> "$GITHUB_OUTPUT"
            echo "captured last-good image for rollback"
          else
            echo "no running frontend container yet (first deploy)"
          fi

      # NEXT_PUBLIC_API_URL is read from /opt/dvla/.env as a build arg by compose.
      - name: Build & deploy frontend
        working-directory: /opt/dvla
        run: docker compose up -d --build frontend

      - name: Health check (auto-rollback on failure)
        working-directory: /opt/dvla
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://dvla.3dt.com.gh || true)
            if [ "$code" = "200" ]; then echo "✅ frontend up"; exit 0; fi
            echo "waiting for frontend... ($i: $code)"; sleep 3
          done
          echo "❌ frontend check failed — rolling back to last-good image"
          docker compose logs frontend --tail=60 || true
          SHA="${{ steps.prev.outputs.sha }}"; REF="${{ steps.prev.outputs.ref }}"
          if [ -n "$SHA" ] && [ -n "$REF" ]; then
            docker tag "$SHA" "$REF"
            docker compose up -d --no-build frontend
            echo "↩️ rolled back to previous image ($SHA); pre-live stays on last-good version"
          else
            echo "no previous image captured — cannot roll back automatically"
          fi
          exit 1

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
